name: Hottarakashi Watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Show files
        run: |
          pwd
          ls -la

      - name: Run check
        run: python check.py
            steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show environment
        run: |
          python --version
          pip --version
          env | sort

      - name: Install packages (verbose)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -v

      - name: Show files
        run: |
          pwd
          ls -la

      - name: Run check (verbose)
        run: |
          set -x
          python -u check.py

